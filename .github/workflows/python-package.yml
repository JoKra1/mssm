# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
# Adapted based on: https://github.com/pypa/cibuildwheel
# https://stackoverflow.com/questions/69257912/
# and the python-package-conda.yml

name: Python package

on:
  push:
  workflow_dispatch:

jobs:
  test-coverage:
    # Runs tests for one build for which coverage is computed as well
    if: github.repository == 'JoKra1/mssm'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python for Coverage
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.2'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy==2.3.3 scipy==1.16.2 pandas==2.3.2
          pip install .
      - name: Test with pytest
        run: |
          pip install pytest pytest-cov mssmViz==0.1.48 numdifftools
          pytest ./tests/test_segfault.py --cov=mssm --cov-report=xml --cov-report=html
